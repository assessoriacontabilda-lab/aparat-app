name: Bump aparat-fix FORCADO para v10
on:
  push:
    paths:
      - '.github/workflows/bump-final.yml'
  workflow_dispatch:
jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Forcar versao do script para v10 (qualquer numero atual)
        run: |
          for f in index.html app/index.html portal/index.html; do
            if [ -f "$f" ]; then
              sed -i -E 's/aparat-fix\.js\?v=[0-9]+/aparat-fix.js?v=10/g' "$f"
              echo "bumped: $f"
              grep -o 'aparat-fix\.js?v=[0-9]*' "$f" | head -1 || true
            fi
          done
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "cache: forcar aparat-fix v10 (obrigacoes anuais + anexos)"
          git push
