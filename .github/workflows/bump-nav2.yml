name: Bump nav-snippet v2 e aparat-fix v16
on:
  push:
    paths:
      - '.github/workflows/bump-nav2.yml'
  workflow_dispatch:
jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Bumpar versoes
        run: |
          for f in index.html app/index.html portal/index.html; do
            if [ -f "$f" ]; then
              sed -i -E 's/nav-snippet\.js\?v=[0-9]+/nav-snippet.js?v=2/g' "$f"
              sed -i -E 's/aparat-fix\.js\?v=[0-9]+/aparat-fix.js?v=16/g' "$f"
              echo "bumped: $f"
            fi
          done
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "fix: mostrar container das paginas no cliente (mobile) v2"
          git push
