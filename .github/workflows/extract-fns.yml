name: Extract Docs Functions
on:
  push:
    paths:
      - '.github/workflows/extract-fns.yml'
jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract functions
        run: |
          python3 - << 'PYEOF'
          with open('index.html','r',encoding='utf-8') as f:
              c=f.read()
          # Find the main script block
          js_start = c.rfind('<script>')
          js = c[js_start:]
          out = []
          fns = ['carregarDocsSeguro','dsTab','renderDocCliente','ap-docs','dsUpload','listarDocs','clienteDoc','listarArquivos']
          for fn in fns:
              ki = js.find(fn)
              if ki >= 0:
                  out.append(f"=== FN: {fn} at js+{ki} ===")
                  out.append(js[max(0,ki-100):ki+800])
                  out.append("=== END ===\n")
          # Also get the full sec-docs-seguros HTML (in HTML part)
          html = c[:js_start]
          hi = html.find('sec-docs-seguros')
          if hi >= 0:
              out.append("=== HTML: sec-docs-seguros ===")
              out.append(html[max(0,hi-50):hi+3000])
              out.append("=== END ===\n")
          with open('docs-fns.txt','w',encoding='utf-8') as f:
              f.write('\n'.join(out))
          print(f"Done, {len(out)} sections")
          PYEOF
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs-fns.txt
          git diff --staged --quiet || git commit -m "temp: extract docs functions"
          git push
