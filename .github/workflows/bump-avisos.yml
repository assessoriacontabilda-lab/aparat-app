name: Ativar sistema de avisos (v27)
on:
  push:
    paths:
      - '.github/workflows/bump-avisos.yml'
  workflow_dispatch:
jobs:
  aplicar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Atualizar versoes
        run: |
          python3 - << 'PYEOF'
          import io
          c = io.open('index.html', encoding='utf-8').read()
          c = c.replace('client-pages.js?v=3', 'client-pages.js?v=4')
          c = c.replace('aparat-fix.js?v=22', 'aparat-fix.js?v=23')
          io.open('index.html', 'w', encoding='utf-8').write(c)
          s = io.open('sw.js', encoding='utf-8').read().replace('aparat-v26', 'aparat-v27')
          io.open('sw.js', 'w', encoding='utf-8').write(s)
          ok1 = 'client-pages.js?v=4' in io.open('index.html', encoding='utf-8').read()
          ok2 = '__APARAT_SECR_AVISO__' in io.open('aparat-fix.js', encoding='utf-8').read()
          print('index v4/v23:', ok1, '| secretario no aparat-fix:', ok2)
          PYEOF
      - name: Commit e publicar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html sw.js
          git diff --staged --quiet || git commit -m "feat: sistema de avisos completo - push corrigido, secretario, whatsapp/email (sw v27)"
          git push
