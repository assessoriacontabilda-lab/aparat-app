name: Todos os clientes nos seletores (v25)
on:
  push:
    paths:
      - '.github/workflows/bump-clisel.yml'
  workflow_dispatch:
jobs:
  aplicar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Atualizar versoes
        run: |
          python3 - << 'PYEOF'
          import io
          c = io.open('index.html', encoding='utf-8').read()
          c = c.replace('aparat-fix.js?v=20', 'aparat-fix.js?v=21')
          io.open('index.html', 'w', encoding='utf-8').write(c)
          s = io.open('sw.js', encoding='utf-8').read().replace('aparat-v24', 'aparat-v25')
          io.open('sw.js', 'w', encoding='utf-8').write(s)
          ok1 = 'aparat-fix.js?v=21' in io.open('index.html', encoding='utf-8').read()
          ok2 = '__APARAT_CLISEL__' in io.open('aparat-fix.js', encoding='utf-8').read()
          print('index v21:', ok1, '| seletores completos:', ok2)
          PYEOF
      - name: Commit e publicar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html sw.js
          git diff --staged --quiet || git commit -m "feat: financeiro removido do painel + todos os clientes nos seletores (sw v25)"
          git push
