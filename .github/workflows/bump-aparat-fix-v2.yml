name: Atualizar versao do aparat-fix (v2)
on:
  push:
    paths:
      - '.github/workflows/bump-aparat-fix-v2.yml'
  workflow_dispatch:
jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Atualizar referencia para v=2
        run: |
          python3 - << 'PYEOF'
          import io, re
          with io.open('index.html','r',encoding='utf-8') as f:
              c = f.read()
          novo = '<script defer src="aparat-fix.js?v=2"></script>'
          if 'aparat-fix.js?v=2' in c:
              print('Ja esta em v=2')
          elif 'aparat-fix.js' in c:
              c = re.sub(r'<script[^>]*aparat-fix\.js[^>]*></script>', novo, c, count=1)
              with io.open('index.html','w',encoding='utf-8') as f:
                  f.write(c)
              print('Atualizado para v=2')
          else:
              c = c.replace('</body>', novo + '\n</body>', 1)
              with io.open('index.html','w',encoding='utf-8') as f:
                  f.write(c)
              print('Inserido v=2')
          PYEOF
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "app: aparat-fix v2 (arquivos grandes + instalacao)"
          git push
