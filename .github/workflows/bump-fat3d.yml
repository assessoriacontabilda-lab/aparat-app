name: Faturamento unico + grafico 3D neon (v23)
on:
  push:
    paths:
      - '.github/workflows/bump-fat3d.yml'
  workflow_dispatch:
jobs:
  aplicar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Atualizar versoes
        run: |
          python3 - << 'PYEOF'
          import io
          c = io.open('index.html', encoding='utf-8').read()
          c = c.replace('client-pages.js?v=2', 'client-pages.js?v=3')
          io.open('index.html', 'w', encoding='utf-8').write(c)
          s = io.open('sw.js', encoding='utf-8').read().replace('aparat-v22', 'aparat-v23')
          io.open('sw.js', 'w', encoding='utf-8').write(s)
          ok1 = 'client-pages.js?v=3' in io.open('index.html', encoding='utf-8').read()
          ok2 = '__APARAT_FAT_CHART__' in io.open('client-pages.js', encoding='utf-8').read()
          print('index v3:', ok1, '| grafico 3D no client-pages:', ok2)
          PYEOF
      - name: Commit e publicar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html sw.js
          git diff --staged --quiet || git commit -m "feat: faturamento unico, grafico 3D neon e assistente reposicionado (sw v23)"
          git push
