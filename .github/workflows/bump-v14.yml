name: Bump aparat-fix para v14
on:
  push:
    paths:
      - '.github/workflows/bump-v14.yml'
  workflow_dispatch:
jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Forcar versao para v14
        run: |
          for f in index.html app/index.html portal/index.html; do
            if [ -f "$f" ]; then
              sed -i -E 's/aparat-fix\.js\?v=[0-9]+/aparat-fix.js?v=14/g' "$f"
              echo "bumped: $f"
            fi
          done
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "cache: bump aparat-fix v14"
          git push
