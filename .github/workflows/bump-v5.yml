name: Bump aparat-fix para v5 (forcar atualizacao / cache)
on:
  push:
    paths:
      - '.github/workflows/bump-v5.yml'
  workflow_dispatch:
jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Subir versao do script (v4 -> v5)
        run: |
          for f in index.html app/index.html portal/index.html; do
            if [ -f "$f" ]; then
              sed -i 's/aparat-fix\.js?v=4/aparat-fix.js?v=5/g' "$f"
              echo "bumped: $f"
            fi
          done
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "cache: bump aparat-fix para v5 (selo fluorescente do extrato)"
          git push
